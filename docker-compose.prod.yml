services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: 'x-disturb-backend:prod'
    container_name: x-disturb-app
    restart: always
    expose:
      - '8000'
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      
    # Python-native healthcheck. No curl required.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'
